<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#16a34a">
<title>UPTD SMPN 9 SINJAI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#16a34a,#f59e0b);
    font-family:'Segoe UI',sans-serif;
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    background:#fff;
    border-radius:24px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    animation:fadeIn .8s ease;
}

.logo{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    
    margin-bottom:15px;
}

.school{
    font-size:28px;
    font-weight:700;
    color:#166534;
    margin-bottom:8px;
}

.desc{
    color:#666;
    margin-bottom:25px;
}

.download-btn{
    display:block;
    width:100%;
    padding:16px;
    border-radius:14px;
    text-decoration:none;
    color:#fff;
    font-size:18px;
    font-weight:600;
    background:linear-gradient(135deg,#f59e0b,#ea580c);
    transition:.3s;
}

.download-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(234,88,12,.3);
}

.info{
    margin-top:20px;
    padding:12px;
    background:#f8fafc;
    border-radius:12px;
    color:#555;
    font-size:14px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:480px){
    .school{
        font-size:22px;
    }

    .download-btn{
        font-size:16px;
    }
}
</style>
</head>

<body>

<div class="card">

    <img src="https://smpn9sinjai.sch.id/smp.jpg" class="logo" alt="Logo SMPN 9 Sinjai">

    <h1 class="school">UPTD SMPN 9 SINJAI</h1>

    <p class="desc">
        Download Ijazah dan Transkrip Nilai Tahun 2026
    </p>

    <a class="download-btn"
       href="https://drive.google.com/uc?export=download&id=1ooMnjj3mSmjAkfu7lfkQw8BLvH-oGMFn">
        📄 Download Sekarang
    </a>

    <div class="info">
        Pastikan file berhasil terunduh dan simpan di perangkat Anda.
    </div>

</div>

</body>
</html>
